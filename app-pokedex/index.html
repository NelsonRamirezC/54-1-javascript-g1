<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pokedex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script defer type="module" src="./assets/js/index.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-danger navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Mi Pokedex</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                    <a class="nav-link" href="#">Features</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5">
        <h1 class="text-center">Registra tus Pokémons</h1>
    </header>

    <main class="container">
        <section>
            <div class="row">
                <div class="col-4">
                    <form id="form-get-pokemon">
                        <div class="mb-3">
                            <label for="id-or-name-pokemon" class="form-label">Nombre o Número Pokédex:</label>
                            <input type="text" class="form-control" id="id-or-name-pokemon" name="pokemon" required>
                        </div>
                        <div>
                            <button type="submit" class="btn btn-danger">Buscar</button>
                        </div>
                    </form>
                </div>
                <div class="col-8">

                    <div class="card mb-3">
                        <div class="row g-0">
                            <div class="col-md-4 p-2 d-flex">
                                <img src="./assets/img/base_imagen_pokemon.jpg" class="img-fluid w-100 rounded-start"
                                    alt="..." id="pokemon-imagen">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body">
                                    <h5 class="card-title" id="pokemon-nombre">Pokemon 1</h5>
                                    <p class="card-text">
                                        Peso:
                                        <span id="pokemon-peso"></span>
                                    </p>
                                    <p class="card-text">
                                        Estatura:
                                        <span id="pokemon-estatura"></span>
                                    </p>
                                    <p class="card-text">
                                        Tipo:
                                        <span id="pokemon-tipo"></span>
                                    </p>
                                    <div class="py-3 d-flex justify-content-end px-3">
                                        <button id="btn-add-pokemon" class="btn btn-danger">Agregar a Pokédex</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>



</body>

</html>
