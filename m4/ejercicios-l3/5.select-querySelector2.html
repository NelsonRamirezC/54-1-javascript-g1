<ul id="lista">
    <li>Elemento 1</li>
    <li>Elemento 2</li>
    <li>Elemento 3</li>
    <li>Elemento 4</li>
    <li>Elemento 5</li>
</ul>


<script>

    //CAPTURAR EL PRIMER ELEMENTO
    const primerElemento = document.querySelector("#lista li:first-child");
    primerElemento.style.color = "orange";


    //CAPTURAR EL ÚLTIMO ELEMENTO
    const ultimoElemento = document.querySelector("#lista li:last-child");
    ultimoElemento.style.color = "blueviolet";


    //FILTRAR ELEMENTOS POR POSICIÓN (COMIENZA EN 1)
    const tercerElemento = document.querySelector("#lista li:nth-child(3)");
    tercerElemento.style.color = "green";

</script>
