<ul id="lista">
    <li>Elemento 1</li>
    <li>Elemento 2</li>
    <li>Elemento 3</li>
    <li>Elemento 4</li>
    <li>Elemento 5</li>
</ul>


<script>

    const elementosEven = document.querySelectorAll("#lista li:nth-child(even)");

    for (const elemento of elementosEven) {
        elemento.style.backgroundColor = "grey";
        elemento.style.color = "white";
    }

    const elementosOdd = document.querySelectorAll("#lista li:nth-child(odd)");

    for (const elemento of elementosOdd) {
        elemento.style.backgroundColor = "yellow";

    }
</script>
