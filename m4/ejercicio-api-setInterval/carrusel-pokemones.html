<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <style>
        .card .card-img-top {
            aspect-ratio: 3/2;
        }
    </style>

    <script defer src="https://momentjs.com/downloads/moment-with-locales.js"></script>

    <script defer src="./carrusel_pokemones.js"></script>
    <script defer src="./widget_hora.js"></script>
</head>

<body>

    <main class="container">

        <header class="py-3">
            <h1 class="text-center">Carrusel pokémones</h1>
            <p id="hora-sistema" class="text-center"></p>
        </header>

        <section>
            <div class="row justify-content-center">
                <div class="col-4">
                    <div class="card">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg"
                            class="card-img-top" alt="bulbasaur" id="pokemon-imagen">
                        <div class="card-body">
                            <h5 class="card-title" id="pokemon-nombre">bulbasaur</h5>
                            <p class="card-text">Peso: <span id="pokemon-peso">69 Kgs.</span></p>
                            <p class="card-text">Estatura: <span id="pokemon-estatura">7 Mts.</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
